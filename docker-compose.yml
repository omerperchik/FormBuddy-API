services:
  api:
    build: .
    ports:
      - "3500:3500"
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: formbuddy
      POSTGRES_USER: formbuddy
      POSTGRES_PASSWORD: formbuddy_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./src/db/schema.sql:/docker-entrypoint-initdb.d/001_schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U formbuddy"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
